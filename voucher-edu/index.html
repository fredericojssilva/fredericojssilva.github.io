<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Parabéns Eduardinho!</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff4fa3, #00e5d4);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            color: #222;
            padding: 40px;
            border-radius: 25px;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 4rem;
            margin: 0;
        }

        .money {
            font-size: 5rem;
            color: #00c9a7;
            font-weight: bold;
            margin: 20px 0;
        }

        .chatgpt {
            color: #10a37f;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: #ff4fa3;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .emoji {
            font-size: 60px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="emoji">😂</div>

    <h1>Foste Apanhado!</h1>

    <p>Achavas mesmo que este vale era oficial?</p>

    <p>
        A tua tia fez isto com a ajuda do
        <span class="chatgpt">ChatGPT</span> 🤖
    </p>

    <p>Mas a parte importante continua a ser verdade...</p>

    <div class="money">70€</div>

    <h2>🎂 Feliz Aniversário, Eduardinho! 🎂</h2>

    <a class="btn" href="#" onclick="alert('Os 70€ serão entregues em mãos 😄')">
        Onde estão os meus 70€?
    </a>
</div>

</body>
</html>
